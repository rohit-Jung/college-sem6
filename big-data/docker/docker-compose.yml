version: "3"
services:
  mongo-bigdata:
    image: mongo:latest
    container_name: monogdb_bigdata
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_vol:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
volumes:
  mongo_vol:
